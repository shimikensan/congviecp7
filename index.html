<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Tasks Square Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .task-done { text-decoration: line-through; opacity: 0.5; }
        
        /* Cấu hình Border cho Priority - Giữ vuông vức */
        .priority-high { border-left: 6px solid #ef4444; }
        .priority-medium { border-left: 6px solid #f59e0b; }
        .priority-low { border-left: 6px solid #10b981; }

        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .bg-card { background-color: #1e293b; color: #ffffff; }
        .dark-mode input, .dark-mode select { background-color: #334155; color: white; border-color: #475569; }
        
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Khử bỏ bo tròn mặc định của trình duyệt */
        * { border-radius: 0 !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <div class="max-w-md mx-auto md:max-w-2xl shadow-2xl md:mt-10 overflow-hidden bg-white bg-card relative">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-700 p-6 text-white flex justify-between items-center shadow-lg">
            <div>
                <h1 class="text-2xl font-black tracking-tight uppercase">Nhiệm Vụ 📋</h1>
                <p id="date-display" class="text-[10px] opacity-80 capitalize font-bold tracking-widest"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDashboard()" class="p-3 bg-white/20 hover:bg-white/30 transition"><i class="fas fa-chart-pie"></i></button>
                <button onclick="toggleDarkMode()" class="p-3 bg-white/20 hover:bg-white/30 transition"><i id="darkIcon" class="fas fa-moon"></i></button>
            </div>
        </div>

        <div id="dashboardSection" class="hidden p-6 border-b bg-gray-50 dark:bg-slate-800/50 animate-pop text-center">
            <h2 class="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-[0.2em]">Thống kê & Dữ liệu</h2>
            <div class="w-44 h-44 mx-auto mb-6"><canvas id="taskChart"></canvas></div>
            
            <div class="grid grid-cols-2 gap-3 max-w-xs mx-auto">
                <button onclick="exportBackup()" class="flex items-center justify-center gap-2 bg-green-600 text-white py-3 text-[10px] font-black uppercase shadow-md active:scale-95 transition">
                    <i class="fas fa-file-export"></i> Sao lưu
                </button>
                <label class="flex items-center justify-center gap-2 bg-orange-500 text-white py-3 text-[10px] font-black uppercase shadow-md active:scale-95 transition cursor-pointer">
                    <i class="fas fa-file-import"></i> Khôi phục
                    <input type="file" id="importFile" class="hidden" onchange="importBackup(event)" accept=".json">
                </label>
            </div>
        </div>

        <div id="updateBanner" class="hidden bg-yellow-400 text-black p-3 text-center text-xs font-bold animate-pulse cursor-pointer" onclick="updateApp()">
            ✨ CÓ PHIÊN BẢN MỚI! NHẤN ĐỂ CẬP NHẬT.
        </div>

        <div id="inputForm" class="hidden p-5 border-b space-y-3 bg-indigo-50 dark:bg-slate-700/30 animate-pop">
            <input type="hidden" id="editId">
            <input type="text" id="taskInput" placeholder="Tên việc cần làm..." class="w-full border px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-gray-800 dark:text-white">
            <input type="text" id="assigneeInput" placeholder="Người thực hiện" class="w-full border px-4 py-2 outline-none text-sm font-medium">
            
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col"><label class="text-[9px] ml-1 text-gray-500 font-black uppercase mb-1">Bắt đầu</label><input type="datetime-local" id="timeInput" class="border px-4 py-2 outline-none text-xs"></div>
                <div class="flex flex-col"><label class="text-[9px] ml-1 text-red-500 font-black uppercase mb-1">Hạn chót</label><input type="datetime-local" id="deadlineInput" class="border px-4 py-2 outline-none text-xs border-red-200"></div>
            </div>

            <div class="flex gap-2 pt-2">
                <select id="priorityInput" class="flex-1 border px-3 py-2 text-xs font-bold bg-gray-50">
                    <option value="low">Ưu tiên: Thấp</option>
                    <option value="medium">Ưu tiên: Vừa</option>
                    <option value="high">Ưu tiên: Cao</option>
                </select>
                <button onclick="handleTask()" id="btnAction" class="flex-[2] bg-indigo-600 text-white font-black py-3 shadow-lg active:scale-95 transition text-sm">LƯU NHIỆM VỤ</button>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 p-3 border-b space-y-3">
            <div class="flex bg-gray-100 dark:bg-slate-800 p-1 shadow-inner">
                <button onclick="setFilter('all')" id="f-all" class="flex-1 py-2 text-[9px] font-black transition bg-indigo-600 text-white">TẤT CẢ</button>
                <button onclick="setFilter('active')" id="f-active" class="flex-1 py-2 text-[9px] font-black text-gray-400">ĐANG LÀM</button>
                <button onclick="setFilter('completed')" id="f-completed" class="flex-1 py-2 text-[9px] font-black text-gray-400">ĐÃ XONG</button>
            </div>
        </div>

        <div id="taskList" class="min-h-[400px] max-h-[60vh] overflow-y-auto divide-y dark:divide-slate-700"></div>
    </div>

    <button onclick="toggleForm()" class="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white shadow-2xl flex items-center justify-center text-2xl z-50 ring-4 ring-white dark:ring-slate-800 transition-transform active:scale-90"><i class="fas fa-plus" id="fabIcon"></i></button>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        let tasks = JSON.parse(localStorage.getItem('todo_pro_final')) || [];
        let currentStatusFilter = 'all';
        let isDarkMode = localStorage.getItem('dark_mode') === 'true';
        let myChart = null;
        let newWorker;

        if (isDarkMode) document.body.classList.add('dark-mode');
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('vi-VN', {weekday:'long', day:'numeric', month:'long'});

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            document.getElementById('updateBanner').classList.remove('hidden');
                        }
                    });
                });
            });
        }

        function updateApp() { if (newWorker) newWorker.postMessage({ action: 'skipWaiting' }); window.location.reload(); }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark_mode', isDarkMode);
            if(!document.getElementById('dashboardSection').classList.contains('hidden')) renderChart();
        }

        function toggleDashboard() {
            const dash = document.getElementById('dashboardSection');
            dash.classList.toggle('hidden');
            if(!dash.classList.contains('hidden')) renderChart();
        }

        function toggleForm() {
            const form = document.getElementById('inputForm');
            const isHidden = form.classList.toggle('hidden');
            document.getElementById('fabIcon').className = isHidden ? 'fas fa-plus' : 'fas fa-minus';
        }

        function handleTask() {
            const text = document.getElementById('taskInput').value;
            if (!text) return alert("Nhập nội dung!");
            const id = document.getElementById('editId').value;
            const taskData = {
                id: id ? parseInt(id) : Date.now(),
                text,
                assignee: document.getElementById('assigneeInput').value,
                time: document.getElementById('timeInput').value,
                deadline: document.getElementById('deadlineInput').value,
                priority: document.getElementById('priorityInput').value,
                completed: false, notified: false
            };
            if (id) {
                const idx = tasks.findIndex(t => t.id == id);
                tasks[idx] = { ...tasks[idx], ...taskData };
            } else { tasks.unshift(taskData); }
            saveAndRender();
            toggleForm();
            resetForm();
        }

        function render() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            let filtered = tasks.filter(t => {
                if (currentStatusFilter === 'active' && t.completed) return false;
                if (currentStatusFilter === 'completed' && !t.completed) return false;
                return true;
            });
            filtered.forEach(task => {
                const overdue = isOverdue(task.deadline) && !task.completed;
                const priorityMap = { low: 'Thấp', medium: 'Vừa', high: 'Cao' };
                const priorityColor = { low: 'text-green-500', medium: 'text-amber-500', high: 'text-red-500' };
                const div = document.createElement('div');
                div.className = `p-5 priority-${task.priority} flex items-start gap-4 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition animate-pop`;
                div.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})" class="mt-1 w-6 h-6 accent-indigo-600 shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="${task.completed ? 'task-done text-gray-400' : 'font-bold text-gray-800 dark:text-gray-100'} text-sm">
                            ${task.text}
                            ${overdue ? '<span class="ml-2 text-[8px] bg-red-600 text-white px-2 py-0.5 font-black uppercase">Quá hạn</span>' : ''}
                        </div>
                        <div class="flex flex-col gap-1 mt-2 text-[9px] uppercase font-bold text-gray-400">
                            <span>Ưu tiên: <span class="${priorityColor[task.priority]}">${priorityMap[task.priority]}</span></span>
                            <span><i class="fas fa-user-circle mr-1"></i>${task.assignee || '---'}</span>
                            <span class="${overdue ? 'text-red-600 font-black' : 'text-indigo-400'} uppercase"><i class="fas fa-hourglass-end mr-1"></i>Hạn: ${task.deadline ? new Date(task.deadline).toLocaleString('vi-VN') : '---'}</span>
                        </div>
                    </div>
                    <div class="flex gap-1"><button onclick="editTask(${task.id})" class="text-indigo-400 p-2"><i class="fas fa-pen"></i></button><button onclick="deleteTask(${task.id})" class="text-red-300 p-2"><i class="fas fa-trash"></i></button></div>
                `;
                list.appendChild(div);
            });
            renderChart();
        }

        function renderChart() {
            const canvas = document.getElementById('taskChart');
            if(!canvas || document.getElementById('dashboardSection').classList.contains('hidden')) return;
            const onTime = tasks.filter(t => t.completed || !isOverdue(t.deadline)).length;
            const overdue = tasks.filter(t => !t.completed && isOverdue(t.deadline)).length;
            if (myChart) myChart.destroy();
            myChart = new Chart(canvas, {
                type: 'doughnut', data: {
                    labels: ['Đúng hạn', 'Quá hạn'],
                    datasets: [{ data: [onTime, overdue], backgroundColor: ['#4f46e5', '#ef4444'], borderWidth: 0 }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, cutout: '75%' }
            });
        }

        function exportBackup() {
            if (tasks.length === 0) return alert("Không có dữ liệu!");
            const dataStr = JSON.stringify(tasks, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', `Tasks_Backup_${new Date().toISOString().slice(0,10)}.json`);
            linkElement.click();
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (confirm("Khôi phục dữ liệu?")) { tasks = imported; saveAndRender(); location.reload(); }
                } catch (err) { alert("File lỗi!"); }
            };
            reader.readAsText(file);
        }

        function isOverdue(deadline) { return deadline ? new Date(deadline) < new Date() : false; }
        function saveAndRender() { localStorage.setItem('todo_pro_final', JSON.stringify(tasks)); render(); }
        function toggleTask(id) { const idx = tasks.findIndex(t => t.id == id); tasks[idx].completed = !tasks[idx].completed; saveAndRender(); }
        function editTask(id) {
            const task = tasks.find(t => t.id == id);
            document.getElementById('editId').value = task.id;
            document.getElementById('taskInput').value = task.text;
            document.getElementById('assigneeInput').value = task.assignee || '';
            document.getElementById('timeInput').value = task.time || '';
            document.getElementById('deadlineInput').value = task.deadline || '';
            document.getElementById('priorityInput').value = task.priority;
            document.getElementById('btnAction').innerText = 'CẬP NHẬT';
            if(document.getElementById('inputForm').classList.contains('hidden')) toggleForm();
        }
        function resetForm() { ['editId','taskInput','assigneeInput','timeInput','deadlineInput'].forEach(i => document.getElementById(i).value = ''); }
        function deleteTask(id) { if(confirm('Xóa?')) { tasks = tasks.filter(t => t.id != id); saveAndRender(); } }
        function setFilter(f) { 
            currentStatusFilter = f; 
            document.querySelectorAll('[id^="f-"]').forEach(b => b.className = 'flex-1 py-2 text-[9px] font-black text-gray-400 uppercase');
            document.getElementById('f-'+f).className = 'flex-1 py-2 text-[9px] font-black bg-indigo-600 text-white uppercase';
            render(); 
        }

        setInterval(() => {
            tasks.forEach(t => {
                if(t.deadline && !t.completed && !t.notified && new Date() >= new Date(t.deadline)) {
                    t.notified = true; document.getElementById('alarmSound').play();
                    alert(`QUÁ HẠN: ${t.text}`); saveAndRender();
                }
            });
        }, 60000);

        render();
    </script>
</body>
</html>
