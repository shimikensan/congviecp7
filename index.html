<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Tasks Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .task-done { text-decoration: line-through; opacity: 0.5; }
        .priority-high { border-left: 6px solid #ef4444; }
        .priority-medium { border-left: 6px solid #f59e0b; }
        .priority-low { border-left: 6px solid #10b981; }
        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .bg-card { background-color: #1e293b; color: #ffffff; }
        .dark-mode input, .dark-mode select { background-color: #334155; color: white; border-color: #475569; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <div class="max-w-md mx-auto md:max-w-2xl shadow-2xl md:mt-10 rounded-3xl overflow-hidden bg-white bg-card">
        <div class="bg-gradient-to-r from-teal-600 to-indigo-700 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Nhiệm Vụ 📋</h1>
                <p id="date-display" class="text-xs opacity-90 capitalize font-medium text-white"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDashboard()" class="p-3 rounded-2xl bg-white/20 hover:bg-white/30 transition">
                    <i class="fas fa-chart-pie text-xl"></i>
                </button>
                <button onclick="toggleDarkMode()" class="p-3 rounded-2xl bg-white/20 hover:bg-white/30 transition">
                    <i id="darkIcon" class="fas fa-moon text-xl"></i>
                </button>
            </div>
        </div>

        <div id="dashboardSection" class="hidden p-5 border-b bg-gray-50 dark:bg-slate-800/50 animate-pop">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-black uppercase text-gray-400 tracking-widest">Thống kê tiến độ</h2>
                <button onclick="toggleDashboard()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <div class="w-44 h-44 mx-auto">
                <canvas id="taskChart"></canvas>
            </div>
        </div>

        <div id="inputForm" class="hidden p-5 border-b space-y-3 bg-teal-50 dark:bg-slate-700/30 animate-pop">
            <div class="flex justify-between items-center mb-1">
                <span class="text-sm font-bold text-teal-600">Thêm nhiệm vụ</span>
                <button onclick="toggleForm()" class="text-gray-400 p-2"><i class="fas fa-times"></i></button>
            </div>
            <input type="hidden" id="editId">
            <input type="text" id="taskInput" placeholder="Tên việc cần làm..." class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-teal-500 font-medium">
            <input type="text" id="assigneeInput" placeholder="Người thực hiện" class="w-full border rounded-xl px-4 py-2 outline-none text-sm">
            
            <div class="grid grid-cols-2 gap-2">
                <div class="flex flex-col"><label class="text-[10px] ml-1 text-gray-500 font-bold uppercase">Bắt đầu</label><input type="datetime-local" id="timeInput" class="border rounded-xl px-4 py-2 outline-none text-sm"></div>
                <div class="flex flex-col"><label class="text-[10px] ml-1 text-red-500 font-bold uppercase">Hạn chót</label><input type="datetime-local" id="deadlineInput" class="border rounded-xl px-4 py-2 outline-none text-sm border-red-200"></div>
            </div>

            <div class="flex gap-2">
                <select id="priorityInput" class="flex-1 border rounded-xl px-3 py-2 text-sm font-semibold">
                    <option value="low">Ưu tiên: Thấp</option>
                    <option value="medium">Ưu tiên: Vừa</option>
                    <option value="high">Ưu tiên: Cao</option>
                </select>
                <button onclick="handleTask()" id="btnAction" class="flex-[2] bg-teal-600 text-white font-bold rounded-xl py-3 shadow-lg active:scale-95 transition">LƯU</button>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 p-3 border-b space-y-3">
            <div class="flex items-center gap-2"><span class="text-[10px] font-black uppercase text-gray-400">Lọc ngày:</span><input type="date" id="dateFilter" onchange="render()" class="flex-1 border rounded-lg px-3 py-1 text-sm outline-none"><button onclick="resetDateFilter()" class="text-xs text-teal-600 font-bold">Tất cả</button></div>
            <div class="flex bg-gray-100 dark:bg-slate-800 rounded-xl p-1">
                <button onclick="setFilter('all')" id="f-all" class="flex-1 py-2 rounded-lg text-[10px] font-black transition bg-teal-600 text-white uppercase">Tất cả</button>
                <button onclick="setFilter('active')" id="f-active" class="flex-1 py-2 rounded-lg text-[10px] font-black text-gray-400 uppercase">Đang làm</button>
                <button onclick="setFilter('completed')" id="f-completed" class="flex-1 py-2 rounded-lg text-[10px] font-black text-gray-400 uppercase">Đã xong</button>
            </div>
        </div>

        <div id="taskList" class="min-h-[400px] max-h-[60vh] overflow-y-auto divide-y dark:divide-slate-700"></div>
    </div>

    <button onclick="toggleForm()" class="fixed bottom-8 right-8 w-16 h-16 bg-teal-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-50 ring-4 ring-white dark:ring-slate-800"><i class="fas fa-plus" id="fabIcon"></i></button>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        let tasks = JSON.parse(localStorage.getItem('todo_pwa_v8')) || [];
        let currentStatusFilter = 'all';
        let isDarkMode = localStorage.getItem('dark_mode') === 'true';
        let myChart = null;

        if (isDarkMode) document.body.classList.add('dark-mode');

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark_mode', isDarkMode);
            renderChart();
        }

        function toggleDashboard() {
            const dash = document.getElementById('dashboardSection');
            dash.classList.toggle('hidden');
            if(!dash.classList.contains('hidden')) renderChart();
        }

        function toggleForm() {
            const form = document.getElementById('inputForm');
            const isHidden = form.classList.toggle('hidden');
            document.getElementById('fabIcon').className = isHidden ? 'fas fa-plus' : 'fas fa-minus';
        }

        function handleTask() {
            const id = document.getElementById('editId').value;
            const text = document.getElementById('taskInput').value;
            if (!text) return alert("Nhập tên việc!");

            const taskData = {
                id: id ? parseInt(id) : Date.now(),
                text,
                assignee: document.getElementById('assigneeInput').value,
                time: document.getElementById('timeInput').value,
                deadline: document.getElementById('deadlineInput').value,
                priority: document.getElementById('priorityInput').value,
                completed: false,
                notified: false
            };

            if (id) {
                const idx = tasks.findIndex(t => t.id == id);
                tasks[idx] = { ...tasks[idx], ...taskData };
            } else {
                tasks.unshift(taskData);
            }

            saveAndRender();
            toggleForm();
            resetForm();
        }

        function render() {
            const list = document.getElementById('taskList');
            const dateVal = document.getElementById('dateFilter').value;
            list.innerHTML = '';

            let filtered = tasks.filter(t => {
                if (currentStatusFilter === 'active' && t.completed) return false;
                if (currentStatusFilter === 'completed' && !t.completed) return false;
                if (dateVal && t.time && t.time.split('T')[0] !== dateVal) return false;
                return true;
            });

            filtered.forEach(task => {
                const overdue = isOverdue(task.deadline) && !task.completed;
                const priorityLabels = { low: 'Thấp', medium: 'Vừa', high: 'Cao' };
                const priorityColors = { low: 'text-green-500', medium: 'text-amber-500', high: 'text-red-500' };

                const div = document.createElement('div');
                div.className = `p-5 priority-${task.priority} flex items-start gap-4 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition animate-pop`;
                div.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})" class="mt-1 w-6 h-6 accent-teal-500 shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="${task.completed ? 'task-done text-gray-400' : 'font-bold text-main'}">
                            ${task.text}
                            ${overdue ? '<span class="ml-2 text-[10px] bg-red-600 text-white px-2 py-0.5 rounded-full font-black uppercase tracking-tighter">Quá hạn</span>' : ''}
                        </div>
                        <div class="flex flex-col gap-1 mt-2">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">Ưu tiên: <span class="${priorityColors[task.priority]}">${priorityLabels[task.priority]}</span></span>
                            <span class="text-[10px] text-gray-500 uppercase"><i class="fas fa-user-circle mr-1"></i>${task.assignee || '---'}</span>
                            <span class="text-[10px] text-blue-500 uppercase font-medium"><i class="fas fa-play mr-1"></i>Bắt đầu: ${task.time ? new Date(task.time).toLocaleString('vi-VN') : '---'}</span>
                            <span class="text-[10px] ${overdue ? 'text-red-600 font-black' : 'text-red-400 font-medium'} uppercase"><i class="fas fa-hourglass-end mr-1"></i>Hạn: ${task.deadline ? new Date(task.deadline).toLocaleString('vi-VN') : '---'}</span>
                        </div>
                    </div>
                    <div class="flex gap-1"><button onclick="editTask(${task.id})" class="text-teal-500 p-2"><i class="fas fa-pen"></i></button><button onclick="deleteTask(${task.id})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button></div>
                `;
                list.appendChild(div);
            });
            renderChart();
        }

        function renderChart() {
            const dash = document.getElementById('dashboardSection');
            if(dash.classList.contains('hidden')) return;

            const canvas = document.getElementById('taskChart');
            const onTimeCount = tasks.filter(t => t.completed || !isOverdue(t.deadline)).length;
            const overdueCount = tasks.filter(t => !t.completed && isOverdue(t.deadline)).length;

            if (myChart) myChart.destroy();
            myChart = new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: ['Đúng hạn', 'Quá hạn'],
                    datasets: [{
                        data: [onTimeCount, overdueCount],
                        backgroundColor: ['#0d9488', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, cutout: '75%' }
            });
        }

        function isOverdue(deadline) {
            if (!deadline) return false;
            return new Date(deadline) < new Date();
        }

        function saveAndRender() { localStorage.setItem('todo_pwa_v8', JSON.stringify(tasks)); render(); }
        function toggleTask(id) {
            const idx = tasks.findIndex(t => t.id == id);
            tasks[idx].completed = !tasks[idx].completed;
            saveAndRender();
        }
        function editTask(id) {
            const task = tasks.find(t => t.id == id);
            document.getElementById('editId').value = task.id;
            document.getElementById('taskInput').value = task.text;
            document.getElementById('assigneeInput').value = task.assignee || '';
            document.getElementById('timeInput').value = task.time || '';
            document.getElementById('deadlineInput').value = task.deadline || '';
            document.getElementById('priorityInput').value = task.priority;
            document.getElementById('btnAction').innerText = 'CẬP NHẬT';
            if(document.getElementById('inputForm').classList.contains('hidden')) toggleForm();
        }
        function resetForm() { ['editId', 'taskInput', 'assigneeInput', 'timeInput', 'deadlineInput'].forEach(i => document.getElementById(i).value = ''); }
        function deleteTask(id) { if(confirm('Xóa?')) { tasks = tasks.filter(t => t.id != id); saveAndRender(); } }
        function resetDateFilter() { document.getElementById('dateFilter').value = ''; render(); }
        function setFilter(f) { 
            currentStatusFilter = f; 
            document.querySelectorAll('[id^="f-"]').forEach(b => b.className = 'flex-1 py-2 rounded-lg text-[10px] font-black text-gray-400 uppercase');
            document.getElementById('f-'+f).className = 'flex-1 py-2 rounded-lg text-[10px] font-black bg-teal-600 text-white uppercase';
            render(); 
        }

        document.getElementById('date-display').innerText = new Date().toLocaleDateString('vi-VN', {weekday:'long', day:'numeric', month:'long'});
        render();
    </script>
</body>
</html>
